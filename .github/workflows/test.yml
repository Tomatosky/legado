name: Test Build

on:
  #push:
  #  branches:
  #    - master
 #   paths:
 #     - '**'
 #     - '!**/ISSUE_TEMPLATE/**'
 #     - '!**/modules/web/**'
  pull_request:
    paths-ignore:
      - '**/modules/web/**'
  workflow_run:
    workflows: [Build Web]
    branches: [master]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  prepare:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Merge pull request') }}
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      versionL: ${{ steps.set-ver.outputs.versionL }}
      lanzou: ${{ steps.check.outputs.lanzou }}
      telegram: ${{ steps.check.outputs.telegram }}
    steps:
      - id: set-ver
        run: |
          version="3.$(TZ=Asia/Shanghai date +%y%m%d%H)"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "versionL=$version" >> $GITHUB_OUTPUT

      - id: check
        run: |
          if [ -n "${{ secrets.LANZOU_ID }}" ]; then
            echo "lanzou=yes" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            echo "telegram=yes" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      matrix:
        product: [app]
        type: [release, releaseA]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      product: ${{ matrix.product }}
      type: ${{ matrix.type }}
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSIONL: ${{ needs.prepare.outputs.versionL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify Beta Release Notes
        if: ${{ matrix.type == 'release' }}
        run: bash .github/scripts/test-extract-latest-update.sh

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Verify Cronet Bundle
        if: ${{ matrix.type == 'release' }}
        run: |
          chmod +x .github/scripts/verify-cronet.sh
          .github/scripts/verify-cronet.sh

      - name: Verify APK Collector
        if: ${{ matrix.type == 'release' }}
        run: bash .github/scripts/test-collect-apks.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Prepare Assets
        run: |
          echo "清空 18PlusList.txt"
          echo "" > $GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt

      - name: Release APK Sign
        run: |
          echo "设置签名文件"
          echo "给apk增加签名"
          cp $GITHUB_WORKSPACE/.github/workflows/legado.jks $GITHUB_WORKSPACE/app/legado.jks
          sed '$a\RELEASE_STORE_FILE=./legado.jks'          $GITHUB_WORKSPACE/gradle.properties -i
          sed '$a\RELEASE_KEY_ALIAS=legado'                 $GITHUB_WORKSPACE/gradle.properties -i
          sed '$a\RELEASE_STORE_PASSWORD=gedoor_legado'     $GITHUB_WORKSPACE/gradle.properties -i
          sed '$a\RELEASE_KEY_PASSWORD=gedoor_legado'       $GITHUB_WORKSPACE/gradle.properties -i

      - name: Run Unit Tests
        if: ${{ matrix.type == 'release' }}
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:testAppReleaseUnitTest --build-cache --parallel --daemon --warning-mode all \
            2>&1 | tee "$RUNNER_TEMP/gradle-unit-test.log"

      - name: Build With Gradle
        run: |
          set -o pipefail
          build_log="$RUNNER_TEMP/gradle-build.log"
          echo "当前版本号: $VERSION"
          sed -i "s/^def version = .*/def version = \"$VERSION\"/" "$GITHUB_WORKSPACE/app/build.gradle"

          if [ "$type" == "release" ]; then
            typeName="新包名"
          else
            typeName="新共存"
            # 替换 releaseA 相关包名（防止冲突）
            sed -i "s/'.release'/'.releaseA'/" "$GITHUB_WORKSPACE/app/build.gradle"
            if [ -f "$GITHUB_WORKSPACE/app/google-services.json" ]; then
              sed -i 's/.release/.releaseA/' "$GITHUB_WORKSPACE/app/google-services.json"
            fi
          fi

          chmod +x gradlew
          echo "开始构建 ARM APK: $product - $typeName"
          ./gradlew :$product:assembleRelease -ParmOnly=true --build-cache --parallel --daemon --warning-mode all \
            2>&1 | tee "$build_log"
          mkdir -p ${{ github.workspace }}/apk/
          bash $GITHUB_WORKSPACE/.github/scripts/collect-apks.sh \
            $GITHUB_WORKSPACE/app/build/outputs/apk \
            $GITHUB_WORKSPACE/apk \
            ${{ env.product }} \
            ${{ env.VERSIONL }} \
            "$typeName" \
            arm

          echo "开始构建通用 APK: $product - $typeName"
          ./gradlew :$product:assembleRelease --build-cache --parallel --daemon --warning-mode all \
            2>&1 | tee -a "$build_log"
          bash $GITHUB_WORKSPACE/.github/scripts/collect-apks.sh \
            $GITHUB_WORKSPACE/app/build/outputs/apk \
            $GITHUB_WORKSPACE/apk \
            ${{ env.product }} \
            ${{ env.VERSIONL }} \
            "$typeName" \
            universal

          echo "移动mapping文件"
          mkdir -p ${{ github.workspace }}/mapping/
          for file in $(find ${{ github.workspace }}/app/build/outputs/mapping -name "mapping.txt"); do
            mv "$file" ${{ github.workspace }}/mapping/mapping.txt
          done

      - name: Check Resolved Gradle Warnings
        run: |
          warning_pattern='Properties should be assigned using|Unable to strip (the following )?librar|error occurred when parsing kotlin metadata|running out of JVM Metaspace'
          if grep -E "$warning_pattern" "$RUNNER_TEMP"/gradle-*.log; then
            echo "Resolved Gradle warning reappeared"
            exit 1
          fi

      - name: Move Missing Rules Files
        run: |
          echo "移动 missing_rules.txt"
          mkdir -p ${{ github.workspace }}/mapping/
          find ${{ github.workspace }}/app/build/outputs/mapping -name "missing_rules.txt" -exec mv {} ${{ github.workspace }}/mapping/missing_rules.txt \; || true

      - name: Upload Missing Rules File
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}.mapping.missing_rules
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/missing_rules.txt

      - name: Check Build Result
        run: |
          expected_packages=(arm universal)
          mapfile -d '' apks < <(find ${{ github.workspace }}/apk -maxdepth 1 \
            -type f -name 'legado_*.apk' -print0)
          if [[ ${#apks[@]} -ne ${#expected_packages[@]} ]]; then
            echo "Expected ${#expected_packages[@]} APKs, found ${#apks[@]}"
            exit 1
          fi

          declare -A verified=()
          for apk in "${apks[@]}"; do
            file_name=$(basename "$apk")
            case "$file_name" in
              *_universal_*) package_kind=universal ;;
              *) package_kind=arm ;;
            esac
            if [[ -n "${verified[$package_kind]:-}" ]]; then
              echo "Multiple APKs detected for $package_kind"
              exit 1
            fi

            packaged_abis=$(unzip -Z1 "$apk" \
              | sed -n 's#^lib/\([^/]*\)/.*#\1#p' \
              | sort -u \
              | paste -sd ' ' -)
            if [[ "$package_kind" == "universal" ]]; then
              expected_native_abis="arm64-v8a armeabi-v7a x86 x86_64"
            else
              expected_native_abis="arm64-v8a armeabi-v7a"
            fi
            if [[ "$packaged_abis" != "$expected_native_abis" ]]; then
              echo "$package_kind APK contains unexpected native ABIs: $packaged_abis"
              exit 1
            fi
            verified[$package_kind]=$apk
          done

          for package_kind in "${expected_packages[@]}"; do
            if [[ -z "${verified[$package_kind]:-}" ]]; then
              echo "Missing APK for $package_kind"
              exit 1
            fi
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}
          if-no-files-found: ignore
          path: ${{ github.workspace }}/apk/*.apk

      - name: Upload Mapping Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}.mapping
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/mapping.txt
