name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{ !github.event.pull_request.draft &&
          github.event.pull_request.user.login != 'mgz0227' &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Review changes with Codex
        id: codex
        uses: openai/codex-action@v1
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          openai-api-key: ${{ secrets.CODE_REVIEW_API_KEY }}
          responses-api-endpoint: ${{ secrets.CODE_REVIEW_API_ENDPOINT }}
          permission-profile: ":read-only"
          codex-args: '["--ephemeral"]'
          prompt-file: .github/codex/prompts/review.md

  publish:
    needs: review
    if: ${{ needs.review.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Publish review comment
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-pr-review -->';
            const body = `${marker}\n## Codex 自动代码审查\n\n${process.env.REVIEW_BODY}`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.startsWith(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
