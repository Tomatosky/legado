name: Beta Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  prepare:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Merge pull request') }}
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      versionL: ${{ steps.set-ver.outputs.versionL }}
      lanzou: ${{ steps.check.outputs.lanzou }}
      telegram: ${{ steps.check.outputs.telegram }}
    steps:
      - id: set-ver
        run: |
          version="3.$(TZ=Asia/Shanghai date +%y%m%d%H)"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "versionL=$version" >> $GITHUB_OUTPUT

      - id: check
        run: |
          if [ -n "${{ secrets.LANZOU_ID }}" ]; then
            echo "lanzou=yes" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            echo "telegram=yes" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      matrix:
        product: [app]
        type: [release, releaseA]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      product: ${{ matrix.product }}
      type: ${{ matrix.type }}
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSIONL: ${{ needs.prepare.outputs.versionL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Prepare Assets
        run: |
          echo "清空 18PlusList.txt"
          echo "" > $GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt

      - name: Release APK Sign
        run: |
          echo "设置签名文件"
          echo "${{ secrets.RELEASE_KEY_STORE }}" | base64 --decode > $GITHUB_WORKSPACE/app/legado.jks
          {
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}"
            echo "RELEASE_STORE_FILE=./legado.jks"
            echo "RELEASE_KEY_ALIAS=legado"
          } >> $GITHUB_WORKSPACE/gradle.properties

      - name: Build With Gradle
        run: |
          echo "当前版本号: $VERSION"
          sed -i "s/^def version = .*/def version = \"$VERSION\"/" "$GITHUB_WORKSPACE/app/build.gradle"

          if [ "$type" == "release" ]; then
            typeName="新包名"
          else
            typeName="新共存"
            # 替换 releaseA 相关包名（防止冲突）
            sed -i "s/'.release'/'.releaseA'/" "$GITHUB_WORKSPACE/app/build.gradle"
            if [ -f "$GITHUB_WORKSPACE/app/google-services.json" ]; then
              sed -i 's/.release/.releaseA/' "$GITHUB_WORKSPACE/app/google-services.json"
            fi
          fi

          chmod +x gradlew
          echo "开始构建 ARM APK: $product - $typeName"
          ./gradlew :$product:assembleRelease -ParmOnly=true --build-cache --parallel --daemon --warning-mode all
          mkdir -p ${{ github.workspace }}/apk/
          bash $GITHUB_WORKSPACE/.github/scripts/collect-apks.sh \
            $GITHUB_WORKSPACE/app/build/outputs/apk \
            $GITHUB_WORKSPACE/apk \
            ${{ env.product }} \
            ${{ env.VERSIONL }} \
            "$typeName" \
            arm

          echo "开始构建通用 APK: $product - $typeName"
          ./gradlew :$product:assembleRelease --build-cache --parallel --daemon --warning-mode all
          bash $GITHUB_WORKSPACE/.github/scripts/collect-apks.sh \
            $GITHUB_WORKSPACE/app/build/outputs/apk \
            $GITHUB_WORKSPACE/apk \
            ${{ env.product }} \
            ${{ env.VERSIONL }} \
            "$typeName" \
            universal

          echo "移动mapping文件"
          mkdir -p ${{ github.workspace }}/mapping/
          for file in $(find ${{ github.workspace }}/app/build/outputs/mapping -name "mapping.txt"); do
            mv "$file" ${{ github.workspace }}/mapping/mapping.txt
          done

      - name: Move Missing Rules Files
        run: |
          echo "移动 missing_rules.txt"
          mkdir -p ${{ github.workspace }}/mapping/
          find ${{ github.workspace }}/app/build/outputs/mapping -name "missing_rules.txt" -exec mv {} ${{ github.workspace }}/mapping/missing_rules.txt \; || true

      - name: Upload Missing Rules File
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}.mapping.missing_rules
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/missing_rules.txt

      - name: Check Build Result
        run: |
          expected_packages=(arm universal)
          mapfile -d '' apks < <(find ${{ github.workspace }}/apk -maxdepth 1 \
            -type f -name 'legado_*.apk' -print0)
          if [[ ${#apks[@]} -ne ${#expected_packages[@]} ]]; then
            echo "Expected ${#expected_packages[@]} APKs, found ${#apks[@]}"
            exit 1
          fi

          declare -A verified=()
          for apk in "${apks[@]}"; do
            file_name=$(basename "$apk")
            case "$file_name" in
              *_universal_*) package_kind=universal ;;
              *) package_kind=arm ;;
            esac
            if [[ -n "${verified[$package_kind]:-}" ]]; then
              echo "Multiple APKs detected for $package_kind"
              exit 1
            fi

            packaged_abis=$(unzip -Z1 "$apk" \
              | sed -n 's#^lib/\([^/]*\)/.*#\1#p' \
              | sort -u \
              | paste -sd ' ' -)
            if [[ "$package_kind" == "universal" ]]; then
              expected_native_abis="arm64-v8a armeabi-v7a x86 x86_64"
            else
              expected_native_abis="arm64-v8a armeabi-v7a"
            fi
            if [[ "$packaged_abis" != "$expected_native_abis" ]]; then
              echo "$package_kind APK contains unexpected native ABIs: $packaged_abis"
              exit 1
            fi
            verified[$package_kind]=$apk
          done

          for package_kind in "${expected_packages[@]}"; do
            if [[ -z "${verified[$package_kind]:-}" ]]; then
              echo "Missing APK for $package_kind"
              exit 1
            fi
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}
          if-no-files-found: ignore
          path: ${{ github.workspace }}/apk/*.apk

      - name: Upload Mapping Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.type }}.mapping
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/mapping.txt

  release:
    needs: [prepare, build, CDN]
    if: github.event_name != 'pull_request' && github.repository == 'LegadoTeam/legado'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: apk/
      - working-directory: apk/
        run: |
          mv */*.apk . || true
          rm -rf */
          for file in *.apk; do
            if [[ "$file" == *新包名* ]]; then
              mv "$file" "${file/新包名/release}"
            else
              mv "$file" "${file/新共存/releaseA}"
            fi
          done

      - name: Prepare Release Notes
        run: |
          bash .github/scripts/extract-latest-update.sh \
            app/src/main/assets/updateLog.md \
            > "$GITHUB_WORKSPACE/release-notes.md"

      - name: Update Version Tag
        run: |
          git tag --force "$VERSION" "$(git rev-parse HEAD)"
          git push origin "refs/tags/$VERSION" --force

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          name: legado_app_${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          bodyFile: ${{ github.workspace }}/release-notes.md
          prerelease: false
          makeLatest: false
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: ${{ github.workspace }}/apk/*.apk

  CDN:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: apk/
      - working-directory: apk/
        run: |
          mv */*.apk . || true
          rm -rf */
          for file in *.apk; do
            if [[ "$file" == *新包名* ]]; then
              mv "$file" "${file/新包名/release}"
            else
              mv "$file" "${file/新共存/releaseA}"
            fi
          done
      - name: Deploy apk to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avzr"
          SOURCE: apk/
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
          TARGET: "/www/wwwroot/cdn.mgz.la/app"

  lanzou:
    needs: [prepare, build]
    if: ${{ github.event_name != 'pull_request' && needs.prepare.outputs.lanzou == 'yes' }}
    runs-on: ubuntu-latest
    env:
      ylogin: ${{ secrets.LANZOU_ID }}
      phpdisk_info: ${{ secrets.LANZOU_PSD }}
      LANZOU_FOLDER_ID: ${{ secrets.LANZOU_FOLDER_ID }}
      LANZOU_URL: ${{ secrets.LANZOU_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: apk/
      - working-directory: apk/
        run: |
          mv */*.apk . || true
          rm -rf */
          bash "$GITHUB_WORKSPACE/.github/scripts/remove-universal-apks.sh" \
            "$GITHUB_WORKSPACE/apk"
      - name: Upload To Lanzou
        continue-on-error: true
        run: |
          path="$GITHUB_WORKSPACE/apk/"
          python3 $GITHUB_WORKSPACE/.github/scripts/lzy_web.py "$path" "$LANZOU_FOLDER_ID"
          echo "[$(TZ=Asia/Shanghai date '+%Y.%m.%d %H:%M:%S')] 分享链接: $LANZOU_URL"
  test_Branch:
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && github.actor == 'LegadoTeam' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: apk/
      - working-directory: apk/
        run: |
          mv */*.apk .
          rm -rf */
          bash "$GITHUB_WORKSPACE/.github/scripts/remove-universal-apks.sh" \
            "$GITHUB_WORKSPACE/apk"
      - name: Push To "test" Branch
        run: |
          cd $GITHUB_WORKSPACE/apk/
          git init
          git checkout -b test
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/LegadoTeam/release"
          git add *.apk
          git commit -m "${{ needs.prepare.outputs.versionL }}"
          git push -f -u origin test
  telegram:
    needs: [prepare, build]
    if: ${{ github.event_name != 'pull_request' && needs.prepare.outputs.telegram == 'yes' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: apk/

      - name: Rename apk
        working-directory: apk/
        run: |
          mv */*.apk . || true
          rm -rf */
          bash "$GITHUB_WORKSPACE/.github/scripts/remove-universal-apks.sh" \
            "$GITHUB_WORKSPACE/apk"
          for file in *.apk; do
            newName=$(echo "$file" | sed -e "s/_/ /g" -e 's/legado/阅读/')
            mv "$file" "$newName"
          done

      - name: Check apk size
        working-directory: apk/
        run: |
          ls -lh
          du -h *

      - name: Post to Telegram Channel
        uses: xireiki/channel-post@v2
        with:
          chat_id: ${{ secrets.CHANNEL_ID }}
          bot_token: ${{ secrets.BOT_TOKEN }}
          context: "#阅读 #Legado #Beta #新包名 ${{ needs.prepare.outputs.versionL }}"
          path: apk/*
          method: sendFile
          large_file: true
          api_id: ${{ secrets.API_ID }}
          api_hash: ${{ secrets.API_HASH }}
          cache_session: true
